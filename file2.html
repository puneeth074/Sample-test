<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    
    <h1 class="text-center">Pricing </h1>
    <p class="text-center">Please checkout our most effective payment models </p>
    <div class="container">
        <div class="row justify-content-evenly">
            <div class="card col-sm-5 col-md-3 mb-3 me-3" >
                <div class="card-header">
                    <h4 class="text-center">Free</h4>
                </div>
                
                <div class="card-body">
                    <h1 class="card-title">$0 / mo</h1>
                    <p class="card-text">10 users included 2gb of storage Email support </p>
                    <button class="btn btn-outline-primary">Sign up for free</button>
                </div>
            </div>
            <div class="card col-sm-5 col-md-3 mb-3 me-3" >
                <div class="card-header">
                    <h4 class="text-center">Pro</h4>
                </div>
                <div class="card-body">
                    <h1 class="card-title">$15 / mo</h1>
                    <p class="card-text">20 users included 10gb of storage priority Email support </p>
                    <button class="btn btn-primary">Get Started</button>
                </div>
            </div>
            <div class="card col-sm-10 col-md-3 mb-3 me-3" >
                <div class="card-header">
                    <h4 class="text-center">Enterprise</h4>
                </div>
                <div class="card-body">
                    <h1 class="card-title">$29 / mo</h1>
                    <p class="card-text">30 users included 15gb of storage phone & Email support </p>
                    <button class="btn btn-primary">Contact Us</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
